<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Boxing Lab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--r:6px;}
html,body{height:100%;overflow:hidden;background:#000;color:#fff;font-family:'Arial Narrow',Arial,sans-serif;font-size:16px;}
.screen{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;overflow:hidden;transition:transform .28s ease,opacity .28s;}
.screen.hidden{transform:translateX(100%);opacity:0;pointer-events:none;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:2px;}
.scroll::-webkit-scrollbar-thumb{background:#222;}
.topbar{background:#000;border-bottom:1px solid #222;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-height:50px;}
.back-btn{background:none;border:none;color:#555;cursor:pointer;display:flex;align-items:center;gap:5px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-family:inherit;padding:4px;}
.bottom-nav{background:#000;border-top:1px solid #1a1a1a;display:flex;flex-shrink:0;}
.nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px 10px;cursor:pointer;border:none;background:none;color:#333;font-family:inherit;font-size:9px;letter-spacing:.1em;text-transform:uppercase;gap:3px;transition:color .15s;border-top:2px solid transparent;}
.nav-tab.active{color:#fff;border-top-color:#fff;}
.card{background:#111;border:1px solid #1a1a1a;border-radius:var(--r);margin:0 14px 10px;overflow:hidden;}
.card-accent{border-left:4px solid;}
.form-field{margin-bottom:13px;}
.form-label{font-size:9px;letter-spacing:.25em;text-transform:uppercase;color:#444;margin-bottom:5px;display:block;}
.form-input{width:100%;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:4px;padding:10px 12px;color:#fff;font-size:14px;outline:none;font-family:inherit;transition:border-color .15s;}
.form-input:focus{border-color:#fff;}
.form-textarea{resize:vertical;min-height:72px;line-height:1.55;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-sheet{background:#111;border:1px solid #222;border-top:1px solid #333;border-radius:14px 14px 0 0;width:100%;max-width:580px;max-height:94vh;overflow-y:auto;padding:18px 16px 34px;}
.modal-handle{width:32px;height:3px;background:#2a2a2a;border-radius:2px;margin:0 auto 16px;}
.modal-title{font-size:17px;font-weight:900;letter-spacing:.04em;margin-bottom:16px;}
.color-row{display:flex;gap:8px;flex-wrap:wrap;}
.color-swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .12s;}
.color-swatch.active{border-color:#fff;transform:scale(1.15);}
.modal-btns{display:flex;gap:10px;margin-top:14px;}
.modal-cancel{flex:1;background:none;border:1px solid #2a2a2a;border-radius:var(--r);padding:11px;color:#555;cursor:pointer;font-family:inherit;font-size:13px;}
.modal-save{flex:2;border:none;border-radius:var(--r);padding:11px;color:#000;cursor:pointer;font-family:inherit;font-weight:900;font-size:13px;letter-spacing:.06em;}
.btn-w{width:100%;border:none;border-radius:var(--r);padding:13px;font-family:inherit;font-weight:900;font-size:14px;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-ghost{background:none;border:1px solid #2a2a2a;border-radius:var(--r);padding:11px;color:#555;cursor:pointer;font-family:inherit;font-size:13px;width:100%;text-align:center;}
.btn-add{width:100%;background:none;border:1px dashed #2a2a2a;border-radius:var(--r);padding:12px;color:#444;cursor:pointer;font-size:13px;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;}
.lv-btn{flex:1;padding:9px 5px;border-radius:4px;background:none;color:#444;cursor:pointer;font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:all .15s;border:1px solid #222;}
.lv-btn.sel{color:#fff;border-color:#fff;background:#1a1a1a;}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:2px;font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;}
.sec-hdr{padding:14px 14px 7px;font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#333;}
.ava{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#000;flex-shrink:0;}
.timer-top{background:#000;border-bottom:2px solid #fff;padding:9px 13px;flex-shrink:0;}
.timer-top-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.ath-big{font-size:22px;font-weight:900;letter-spacing:.05em;text-transform:uppercase;line-height:1;}
.prog-tiny{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:#444;margin-top:2px;}
.t-clock{font-size:38px;font-weight:900;font-variant-numeric:tabular-nums;text-align:center;}
.t-remain{font-size:15px;font-weight:700;color:#555;text-align:right;}
.t-rlbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#333;text-align:right;}
.quit-btn{margin-top:5px;background:none;border:1px solid #2a2a2a;border-radius:4px;padding:3px 9px;color:#444;cursor:pointer;font-size:10px;font-family:inherit;letter-spacing:.06em;text-transform:uppercase;display:block;width:100%;}
.block-banner{padding:9px 13px;flex-shrink:0;border-bottom:3px solid #fff;}
.bb-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.bb-num{font-size:9px;letter-spacing:.2em;text-transform:uppercase;font-weight:700;margin-bottom:1px;}
.bb-name{font-size:20px;font-weight:900;letter-spacing:.02em;line-height:1;}
.bb-sub{font-size:11px;font-style:italic;margin-top:3px;color:#777;}
.bb-cd{font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;text-align:right;}
.bb-cdl{font-size:8px;letter-spacing:.15em;text-transform:uppercase;color:#444;text-align:right;}
.prog-bar{margin-top:7px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;}
.prog-bar-fill{height:100%;border-radius:2px;transition:width 1s linear;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:9px 11px;}
.d-box{background:#080808;border-radius:4px;padding:9px 11px;}
.d-lbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:#333;margin-bottom:4px;}
.d-txt{font-size:12px;line-height:1.55;color:#bbb;white-space:pre-line;}
.coach-box{border-left:3px solid;padding:7px 10px;border-radius:0 4px 4px 0;background:#080808;}
.coach-txt{font-size:11px;font-style:italic;line-height:1.55;color:#666;}
.bli{background:#111;border:1px solid #161616;border-left:4px solid;border-radius:4px;margin-bottom:5px;padding:9px 11px;cursor:pointer;display:flex;align-items:center;gap:9px;}
.bli.active-block{background:#181818;border-color:#333 !important;}
.bli.done-block{opacity:.3;}
.bli-num{font-size:9px;font-weight:700;letter-spacing:.12em;min-width:20px;}
.bli-name{font-size:13px;font-weight:900;flex:1;}
.bli-dur{font-size:14px;font-weight:700;min-width:28px;text-align:right;}
.ctrl-row{background:#000;border-top:1px solid #161616;padding:9px 13px;display:flex;align-items:center;gap:7px;flex-shrink:0;}
.ctrl-nav{background:#111;border:1px solid #1e1e1e;border-radius:var(--r);color:#fff;padding:11px 12px;font-family:inherit;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:4px;min-width:62px;justify-content:center;}
.ctrl-nav:disabled{color:#2a2a2a;border-color:#141414;cursor:default;}
.ctrl-main{flex:1;border:none;border-radius:var(--r);padding:12px;color:#000;font-family:inherit;font-weight:900;font-size:13px;letter-spacing:.08em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;background:#fff;}
.ctrl-reset{background:none;border:1px solid #1e1e1e;border-radius:var(--r);width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;}
.gbar{height:2px;background:#0a0a0a;flex-shrink:0;}
.gbar-fill{height:100%;background:#fff;transition:width 1s linear;}
.done-ov{position:fixed;inset:0;background:#000;z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:24px;}
.done-ov.show{display:flex;}
.done-title{font-size:46px;font-weight:900;text-align:center;line-height:.9;letter-spacing:.03em;}
.done-name{font-size:28px;font-weight:900;text-align:center;}
.ath-card{background:#111;border:1px solid #1a1a1a;border-radius:var(--r);margin:0 14px 9px;cursor:pointer;}
.ath-card:active{opacity:.75;}
.ath-card-inner{padding:13px 15px;display:flex;align-items:center;gap:11px;}
.ath-info{flex:1;min-width:0;}
.ath-name{font-size:16px;font-weight:900;}
.ath-sub{font-size:11px;color:#555;margin-top:2px;}
.ath-stat{font-size:10px;color:#333;margin-top:4px;}
.prof-hdr{background:#0a0a0a;border-bottom:1px solid #1a1a1a;padding:18px 14px;}
.sess-row{background:#0f0f0f;border:1px solid #161616;border-left:3px solid;border-radius:var(--r);margin-bottom:7px;padding:11px 13px;}
.sess-date{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#333;margin-bottom:2px;}
.sess-prog{font-size:13px;font-weight:900;}
.sess-det{font-size:10px;color:#555;margin-top:2px;}
.notes-box{background:#080808;border:1px solid #1a1a1a;border-radius:4px;padding:10px 12px;font-size:13px;color:#aaa;line-height:1.55;min-height:52px;white-space:pre-wrap;}
.edit-topbar{background:#000;border-bottom:1px solid #1a1a1a;padding:9px 13px;display:flex;align-items:center;gap:9px;flex-shrink:0;}
.edit-topbar input{flex:1;background:none;border:none;color:#fff;font-size:17px;font-weight:900;outline:none;font-family:inherit;}
.eblk-row{background:#111;border:1px solid #161616;border-left:4px solid;border-radius:var(--r);margin-bottom:7px;display:flex;align-items:center;overflow:hidden;}
.eblk-main{flex:1;padding:11px;cursor:pointer;min-width:0;}
.eblk-lbl{font-size:13px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.eblk-meta{font-size:10px;color:#555;margin-top:1px;}
.eblk-dur{font-size:17px;font-weight:900;padding:0 9px;min-width:40px;text-align:right;flex-shrink:0;}
.eblk-btn{background:none;border:none;border-left:1px solid #161616;padding:13px 11px;cursor:pointer;color:#444;font-size:14px;}
.eblk-btn.del{color:#4a1a1a;}
.splash{position:fixed;inset:0;background:#000;z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.splash.hidden{display:none;}
</style>
</head>

function save(){
  try{
    localStorage.setItem("bl_progs",JSON.stringify(PROGRAMS));
    localStorage.setItem("bl_athletes",JSON.stringify(ATHLETES));
    localStorage.setItem("bl_sessions",JSON.stringify(SESSIONS));
  }catch(e){}
}
function load(){
  try{
    const p=localStorage.getItem("bl_progs"); PROGRAMS=p?JSON.parse(p):clone(DEFAULT_PROGRAMS);
    const a=localStorage.getItem("bl_athletes"); ATHLETES=a?JSON.parse(a):[];
    const s=localStorage.getItem("bl_sessions"); SESSIONS=s?JSON.parse(s):[];
  }catch(e){ PROGRAMS=clone(DEFAULT_PROGRAMS); ATHLETES=[]; SESSIONS=[]; }

// ══ CLOUD SYNC ═══════════════════════════════════════════════════
const GS_URL = "https://script.google.com/macros/s/AKfycbzP1bEOjHt7XxkKZHq9CDV7QDHjwif8LZPiyL7SthnTEVSwWzCcK0sTA0bFdD92nQUp/exec";

function flattenObj(obj){
  const flat={};
  Object.keys(obj).forEach(k=>{
    const v=obj[k];
    if(k==='blocksDetail'){
      try{
        const blocks=JSON.parse(v);
        flat[k]=blocks.map(b=>b.num+":"+b.label+(b.completed?"✓":"✗")+"("+b.dur+"min)").join(" | ");
      }catch(e){ flat[k]=v||""; }
    } else {
      flat[k]=(v!==null&&typeof v==="object")?JSON.stringify(v):(v??"");
    }
  });
  return flat;
}

async function gsGet(sheet){
  try{
    const r=await fetch(GS_URL+"?action=get&sheet="+encodeURIComponent(sheet),{redirect:"follow"});
    const d=await r.json();
    return(d.ok&&Array.isArray(d.data))?d.data:[];
  }catch(e){ return []; }
}

async function gsPost(action,sheet,data){
  try{
    // Envoie chaque item un par un via GET params simples
    for(const item of data){
      const params=new URLSearchParams();
      params.set("action",action);
      params.set("sheet",sheet);
      params.set("data",JSON.stringify(item));
      await fetch(GS_URL+"?"+params.toString(),{redirect:"follow"});
    }
  }catch(e){ console.warn("gsPost:",e.message); }
}

async function syncNow(){
  const badge=document.getElementById("sync-badge");
  if(badge){badge.textContent="⏳";badge.style.color="#C8972A";}
  try{
    // PUSH local → cloud
    if(ATHLETES.length) await gsPost("upsert","athletes",ATHLETES.map(flattenObj));
    if(SESSIONS.length) await gsPost("upsert","sessions",SESSIONS.map(flattenObj));
    const customProgs=PROGRAMS.filter(p=>p.ownerId);
    if(customProgs.length) await gsPost("upsert","programs_custom",customProgs.map(flattenObj));

    // PULL cloud → local
    const [rA,rS,rP]=await Promise.all([
      gsGet("athletes"), gsGet("sessions"), gsGet("programs_custom")
    ]);
    let changed=false;
    rA.forEach(ra=>{
      if(!ra.id)return;
      if(ra.deleted==="1"){
        // Athlète supprimé dans le cloud - on le retire localement
        const i=ATHLETES.findIndex(a=>a.id===ra.id);
        if(i>=0){ATHLETES.splice(i,1);changed=true;}
        return;
      }
      const i=ATHLETES.findIndex(a=>a.id===ra.id);
      if(i>=0){ATHLETES[i]={...ATHLETES[i],...ra};changed=true;}
      else{ATHLETES.push(ra);changed=true;}
    });
    rS.forEach(rs=>{
      if(rs.id&&!SESSIONS.find(s=>s.id===rs.id)){SESSIONS.push(rs);changed=true;}
    });
    rP.forEach(rp=>{
      if(rp.id&&!PROGRAMS.find(p=>p.id===rp.id)){PROGRAMS.push(rp);changed=true;}
    });
    if(changed){save();renderProgs();renderAthletes();}

    const now=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
    localStorage.setItem("bl_last_sync",now);
    if(badge){badge.textContent="✓ "+now;badge.style.color="#3A8C5C";}
  }catch(err){
    console.error("Sync error:",err);
    if(badge){badge.textContent="⚠";badge.style.color="#E82B2B";}
  }
}

function openSyncSettings(){
  document.getElementById("sync-url-input").value=GS_URL;

  });
}

    const progs=PROGRAMS.filter(p=>p.level===lv&&!p.ownerId);
    if(!progs.length)return;
    const lvLabels={deb:"🟢 Débutant",int:"🟧 Intermédiaire",pro:"🔴 Pro / Avancé"};
    html+=`<div class="sec-hdr">${lvLabels[lv]}</div>`;
    progs.forEach(p=>{html+=pickProgCard(p,false);});
  });
  scroll.innerHTML=html||'<div style="text-align:center;padding:40px;color:#333;">Aucun programme</div>';
}

function pickProgCard(p,isPersonal){
  const total=p.blocks.reduce((a,b)=>a+b.dur,0);
  const c=p.color||"#fff";
  return `<div class="card card-accent" style="border-left-color:${c};">
    <div style="padding:12px 13px;">
      ${isPersonal?`<div style="font-size:9px;color:#C8972A;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px;">✦ Programme perso</div>`:""}
      <div style="font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:#333;margin-bottom:2px;">${p.seance||""}</div>
      <div style="font-size:15px;font-weight:900;">${p.name}</div>
      <div style="font-size:10px;color:#444;margin-top:1px;">${p.blocks.length} blocs · ${total} min</div>
      <div style="display:flex;gap:2px;margin:7px 0;">${p.blocks.map(b=>`<div style="height:3px;flex:1;background:${b.color};border-radius:1px;"></div>`).join("")}</div>
      <div style="display:flex;gap:7px;">
        <button onclick="launchSession('${p.id}')" style="flex:1;background:${c};color:#000;border:none;border-radius:4px;padding:9px;font-weight:900;font-size:12px;letter-spacing:.07em;cursor:pointer;font-family:inherit;">▶ LANCER</button>
        ${currentAthId?`<button onclick="launchWithCustomize('${p.id}')" style="background:none;border:1px solid #2a2a2a;border-radius:4px;padding:9px 11px;color:#555;font-size:11px;cursor:pointer;font-family:inherit;letter-spacing:.05em;">✏️ Adapter</button>`:""}
      </div>
    </div>
  </div>`;
}

function launchSession(progId){
  currentProgram=PROGRAMS.find(p=>p.id===progId); if(!currentProgram)return;
  const ath=currentAthId?ATHLETES.find(a=>a.id===currentAthId):null;
  athleteName=ath?(ath.name+(ath.lastname?" "+ath.lastname[0]+".":"")).toUpperCase():"";
  initTimer(); showScreen("s-timer");
}

function launchWithCustomize(progId){
  const orig=PROGRAMS.find(p=>p.id===progId); if(!orig||!currentAthId)return;
  const ath=ATHLETES.find(a=>a.id===currentAthId);
  const custom=clone(orig);
  custom.id="custom_"+currentAthId+"_"+Date.now();
  custom.ownerId=currentAthId;
  custom.name=orig.name+" — "+(ath?ath.name:"Perso");
  PROGRAMS.push(custom); save();
  openEditor(custom.id,true);
}

// ══ TIMER ════════════════════════════════════════════════════════
function initTimer(){
  elapsed=0;running=false;curBlock=0;clearInterval(timerRef);
  const p=currentProgram;
  document.getElementById("t-athlete").textContent=athleteName||p.name.toUpperCase();
  document.getElementById("t-progname").textContent=athleteName?p.name:"";
  document.getElementById("t-remaining").textContent=fmt(totalSecs(p));
  document.getElementById("t-clock").textContent="00:00";
  document.getElementById("global-fill").style.width="0%";
  document.getElementById("done-overlay").classList.remove("show");
  document.getElementById("done-feedback").value="";
  document.getElementById("done-fb-zone").style.display=currentAthId?"block":"none";
  document.getElementById("main-label").textContent="DÉMARRER";
  document.getElementById("main-icon").innerHTML='<path d="M8 5v14l11-7z"/>';
  document.getElementById("btn-main").style.background="#fff";
  renderBlockList(); setBlock(0,true);
}

function renderBlockList(){
  document.getElementById("block-list").innerHTML=currentProgram.blocks.map((b,i)=>`
    <div class="bli" id="bli${i}" style="border-left-color:${b.color};" onclick="jumpToBlock(${i})">
      <span class="bli-num" style="color:${b.color};">${b.num}</span>
      <div style="flex:1;min-width:0;"><div class="bli-name">${b.label}</div><div style="font-size:10px;color:#444;">${b.sub}</div></div>
      <span class="bli-dur" style="color:${b.color};">${b.dur}<span style="font-size:9px;color:#333;">m</span></span>
    </div>`).join("");
}

function setBlock(idx,instant){
  const p=currentProgram,b=p.blocks[idx];curBlock=idx;
  const banner=document.getElementById("block-banner");
  banner.style.borderBottomColor=b.color; banner.style.background=b.color+"14";
  document.getElementById("bb-num").style.color=b.color;
  document.getElementById("bb-num").textContent=b.num+" · "+b.label;
  document.getElementById("bb-name").textContent=b.label.toUpperCase();
  document.getElementById("bb-sub").textContent=b.sub;
  document.getElementById("bb-timer").style.color=b.color;
  document.getElementById("bb-progress").style.background=b.color;
  if(instant){document.getElementById("bb-progress").style.transition="none";document.getElementById("bb-progress").style.width="0%";}
  document.getElementById("active-detail").innerHTML=`
    <div class="d-box"><div class="d-lbl" style="color:${b.color};">📋 Contenu</div><div class="d-txt">${b.content||""}</div></div>
    <div class="coach-box" style="border-left-color:${b.color};"><div class="d-lbl" style="color:${b.color};">🎯 Coach</div><div class="coach-txt">${b.coach||""}</div></div>`;
  p.blocks.forEach((_,i)=>{
    const el=document.getElementById("bli"+i);if(!el)return;
    const end=cumStart(p.blocks,i)+p.blocks[i].dur*60;
    el.classList.toggle("active-block",i===idx);
    el.classList.toggle("done-block",elapsed>=end&&i!==idx);
  });
  const ae=document.getElementById("bli"+idx);
  if(ae)setTimeout(()=>ae.scrollIntoView({behavior:"smooth",block:"nearest"}),80);
  document.getElementById("btn-prev").disabled=idx===0;
  document.getElementById("btn-next").disabled=idx===p.blocks.length-1;
}

function updateTimer(){
  const p=currentProgram,ts=totalSecs(p);
  document.getElementById("t-clock").textContent=fmt(elapsed);
  document.getElementById("t-remaining").textContent=fmt(Math.max(0,ts-elapsed));
  document.getElementById("global-fill").style.width=Math.min(100,(elapsed/ts)*100)+"%";
  const idx=getBI(p.blocks,elapsed);
  if(idx!==curBlock)setBlock(idx,false);
  const b=p.blocks[curBlock],bs=cumStart(p.blocks,curBlock),bd=b.dur*60;
  document.getElementById("bb-timer").textContent=fmt(Math.max(0,bd-(elapsed-bs)));
  document.getElementById("bb-progress").style.transition="width 1s linear";
  document.getElementById("bb-progress").style.width=Math.min(1,(elapsed-bs)/bd)*100+"%";
}

function toggleTimer(){
  const p=currentProgram;
  if(elapsed>=totalSecs(p)){showDone("SÉANCE TERMINÉE !");return;}
  running=!running;
  if(running){
    document.getElementById("main-label").textContent="PAUSE";
    document.getElementById("main-icon").innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    document.getElementById("btn-main").style.background="#E8622B";
    timerRef=setInterval(()=>{
      if(!running)return;
      elapsed++;updateTimer();
      if(elapsed>=totalSecs(p)){running=false;clearInterval(timerRef);showDone("SÉANCE TERMINÉE !");}
    },1000);
  }else{
    clearInterval(timerRef);
    document.getElementById("main-label").textContent="REPRENDRE";
    document.getElementById("main-icon").innerHTML='<path d="M8 5v14l11-7z"/>';
    document.getElementById("btn-main").style.background="#fff";
  }
}

function showDone(title){
  document.getElementById("done-title").textContent=title;
  document.getElementById("done-name").textContent=athleteName||"BIEN JOUÉ !";
  document.getElementById("done-fb-zone").style.display=currentAthId?"block":"none";
  document.getElementById("done-feedback").value="";
  document.getElementById("done-overlay").classList.add("show");
}

function resetTimer(){running=false;clearInterval(timerRef);elapsed=0;if(currentProgram)initTimer();}
function confirmReset(){if(confirm("Recommencer depuis le début ?"))resetTimer();}
function confirmQuit(){running=false;clearInterval(timerRef);showDone("ARRÊT EN COURS");}
function jumpToBlock(i){elapsed=cumStart(currentProgram.blocks,Math.max(0,Math.min(currentProgram.blocks.length-1,i)));setBlock(i,true);updateTimer();}
function jumpBlock(d){jumpToBlock(curBlock+d);}

function finishSession(noSave){
  if(!noSave&&currentAthId){
    const fb=document.getElementById("done-feedback").value.trim();
    const p=currentProgram;
    const ath=ATHLETES.find(a=>a.id===currentAthId);
    const blocksDetail=p.blocks.map((b,i)=>({
      num:b.num,label:b.label,sub:b.sub,dur:b.dur,
      content:b.content,coach:b.coach,
      completed:i<=Math.min(p.blocks.length-1,curBlock)
    }));
    const session={
      id:"ss_"+Date.now(),
      athleteId:currentAthId,
      athleteName:ath?(ath.name+(ath.lastname?" "+ath.lastname:"")):"",
      athleteLevel:ath?(ath.level||""):"",
      date:new Date().toISOString(),
      dateFormatted:new Date().toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"}),
      programId:p.id,
      programName:p.name,
      programLevel:p.levelLabel||p.level||"",
      programSeance:p.seance||"",
      programPhilosophy:p.philosophy||"",
      isCustomProgram:!!p.ownerId,
      totalBlocks:p.blocks.length,
      blocksCompleted:Math.min(p.blocks.length,curBlock+1),
      duration:Math.round(elapsed/60),
      feedback:fb,
      blocksDetail:JSON.stringify(blocksDetail)
    };
    SESSIONS.push(session);
    save();
    // Sauvegarde automatique cloud
    const badge=document.getElementById("sync-badge");
    if(badge){badge.textContent="⏳";badge.style.color="#C8972A";}
    gsPost("upsert","sessions",[flattenObj(session)]).then(()=>{
      const now=new Date().toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});
      localStorage.setItem("bl_last_sync",now);
      if(badge){badge.textContent="✓ "+now;badge.style.color="#3A8C5C";}
    }).catch(()=>{if(badge){badge.textContent="⚠";badge.style.color="#E82B2B";}});
  }
  document.getElementById("done-overlay").classList.remove("show");
  running=false;clearInterval(timerRef);
  showScreen("s-home");switchTab(noSave||!currentAthId?"deb":"athletes");
  if(!noSave&&currentAthId)setTimeout(()=>openProfile(currentAthId),300);
}

function openAthleteModal(id){
  editAthId=id; athLv="deb";
  const a=id?ATHLETES.find(x=>x.id===id):null;
  document.getElementById("am-title").textContent=a?"Modifier — "+a.name:"Nouvel athlète";
  document.getElementById("am-name").value=a?a.name:"";
  document.getElementById("am-last").value=a?(a.lastname||""):"";
  document.getElementById("am-goal").value=a?(a.goal||""):"";
  document.getElementById("am-notes").value=a?(a.notes||""):"";
  if(a)athLv=a.level||"deb";
  updLvBtns();
  const delBtn=document.getElementById("am-delete-btn");
  if(delBtn)delBtn.style.display=a?"block":"none";
  document.getElementById("ath-modal").classList.add("show");
}
function closeAthleteModal(){document.getElementById("ath-modal").classList.remove("show");}
function pickLv(lv){athLv=lv;updLvBtns();}
function updLvBtns(){document.querySelectorAll("[data-lv]").forEach(b=>b.classList.toggle("sel",b.dataset.lv===athLv));}

function saveAthlete(){
  const name=document.getElementById("am-name").value.trim();
  if(!name){alert("Prénom requis");return;}
  const data={name,lastname:document.getElementById("am-last").value.trim(),level:athLv,goal:document.getElementById("am-goal").value.trim(),notes:document.getElementById("am-notes").value.trim()};
  if(editAthId){const i=ATHLETES.findIndex(a=>a.id===editAthId);if(i>=0)ATHLETES[i]={...ATHLETES[i],...data};}
  else ATHLETES.push({id:"a_"+Date.now(),createdAt:new Date().toISOString(),...data});
  save();closeAthleteModal();renderAthletes();renderPickAthList();
  // Sync immédiat
  gsPost("upsert","athletes",ATHLETES.map(flattenObj)).catch(()=>{});
}

function deleteAthlete(){
  if(!editAthId)return;
  const a=ATHLETES.find(x=>x.id===editAthId);
  if(!confirm("Supprimer "+(a?a.name:"cet athlète")+" ?"))return;
  // Envoie deleted=1 au sheet avant de supprimer localement
  gsPost("upsert","athletes",[{...flattenObj(a), deleted:"1"}]).catch(()=>{});
  ATHLETES=ATHLETES.filter(x=>x.id!==editAthId);
  save();closeAthleteModal();renderAthletes();
}

function openProfile(id){currentAthId=id;renderProfile(id);showScreen("s-profile");}

function exportAll(){
  let csv="Athlète;Nom;Niveau;Objectif;Notes;Date séance;Programme;Blocs;Durée (min);Feedback\n";
  ATHLETES.forEach(a=>{
    const lv=LV[a.level]||LV.deb;
    const sessions=SESSIONS.filter(s=>s.athleteId===a.id);
    const notes=(a.notes||"").replace(/\n/g," ").replace(/"/g,"'");
    if(!sessions.length){csv+=`"${a.name}";" ${a.lastname||""}";" ${lv.label}";" ${a.goal||""}";" ${notes}";;;;; \n`;}
    else sessions.forEach(s=>{
      const d=new Date(s.date).toLocaleDateString("fr-FR");
      const fb=(s.feedback||"").replace(/"/g,"'");
      csv+=`"${a.name}";" ${a.lastname||""}";" ${lv.label}";" ${a.goal||""}";" ${notes}";" ${d}";" ${s.programName}";${s.blocksCompleted};${s.duration};" ${fb}"\n`;
    });
  });
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="BoxingLab_Export_"+new Date().toISOString().slice(0,10)+".csv";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ══ EDITOR ═══════════════════════════════════════════════════════
function openEditor(id,launchAfter){
  afterEditLaunch=!!launchAfter;
  editProg=clone(PROGRAMS.find(p=>p.id===id));
  renderEditor();showScreen("s-edit");
}
function renderEditor(){
  const p=editProg;
  document.getElementById("edit-prog-name").value=p.name;
  const total=p.blocks.reduce((a,b)=>a+b.dur,0);
  document.getElementById("edit-stats").innerHTML=`<span><b style="color:#fff">${p.blocks.length}</b> blocs</span><span><b style="color:#fff">${total}</b> min</span>`;
  const owner=p.ownerId?ATHLETES.find(a=>a.id===p.ownerId):null;
  document.getElementById("edit-owner-badge").innerHTML=owner?
    `<div style="background:#C8972A1a;border:1px solid #C8972A44;border-radius:4px;padding:8px 11px;font-size:11px;color:#C8972A;">✦ Programme personnalisé pour <b>${owner.name}</b></div>`:"";
  document.getElementById("edit-block-list").innerHTML=p.blocks.map((b,i)=>`
    <div class="eblk-row" style="border-left-color:${b.color};">
      <div class="eblk-main" onclick="openBlockModal(${i})">
        <div class="eblk-lbl">${b.num} · ${b.label}</div>
        <div class="eblk-meta">${b.sub}</div>
      </div>
      <div class="eblk-dur" style="color:${b.color};">${b.dur}<span style="font-size:9px;color:#333;">m</span></div>
      <button class="eblk-btn" onclick="openBlockModal(${i})">✏️</button>
      <button class="eblk-btn del" onclick="delBlock(${i})">🗑</button>
    </div>`).join("");
}
function saveAndBackEdit(){
  const name=document.getElementById("edit-prog-name").value.trim();
  if(name)editProg.name=name;
  const i=PROGRAMS.findIndex(p=>p.id===editProg.id);
  if(i>=0)PROGRAMS[i]=editProg;else PROGRAMS.push(editProg);
  save();
  if(afterEditLaunch){afterEditLaunch=false;launchSession(editProg.id);}
  else{renderProgs();showScreen("s-home");switchTab("deb");}
}
function addBlock(){
  editProg.blocks.push({num:String(editProg.blocks.length+1).padStart(2,"0"),label:"Nouveau bloc",sub:"Description",dur:5,color:"#ffffff",content:"Contenu",coach:"Note coach"});
  renderEditor();openBlockModal(editProg.blocks.length-1);
}
function delBlock(i){
  if(editProg.blocks.length<=1){alert("Min 1 bloc");return;}
  if(!confirm('Supprimer "'+editProg.blocks[i].label+'" ?'))return;
  editProg.blocks.splice(i,1);
  editProg.blocks.forEach((b,j)=>b.num=String(j+1).padStart(2,"0"));
  renderEditor();
}
function resetProg(){
  if(!confirm("Remettre l'original ?"))return;
  const orig=DEFAULT_PROGRAMS.find(p=>p.id===editProg.id);
  if(orig)editProg=clone(orig);renderEditor();
}

function openBlockModal(i){
  editBlockIdx=i;const b=editProg.blocks[i];
  document.getElementById("bm-title").textContent="Modifier — "+b.label;
  document.getElementById("bm-num").value=b.num;
  document.getElementById("bm-dur").value=b.dur;
  document.getElementById("bm-label").value=b.label;
  document.getElementById("bm-sub").value=b.sub;
  document.getElementById("bm-content").value=b.content;
  document.getElementById("bm-coach").value=b.coach;
  document.querySelectorAll("#bm-colors .color-swatch").forEach(sw=>{
    sw.classList.toggle("active",sw.dataset.c===b.color);
    sw.onclick=()=>{
      document.querySelectorAll("#bm-colors .color-swatch").forEach(s=>s.classList.remove("active"));
      sw.classList.add("active");
      document.getElementById("bm-save").style.background=sw.dataset.c;
      document.getElementById("bm-save").style.color=sw.dataset.c==="#ffffff"?"#000":"#fff";
    };
  });
  document.getElementById("bm-save").style.background=b.color;
  document.getElementById("bm-save").style.color=b.color==="#ffffff"?"#000":"#fff";
  document.getElementById("block-modal").classList.add("show");
}
function closeBlockModal(){document.getElementById("block-modal").classList.remove("show");}
function saveBlock(){
  const b=editProg.blocks[editBlockIdx];
  b.num=document.getElementById("bm-num").value.trim()||b.num;
  b.dur=Math.max(1,parseInt(document.getElementById("bm-dur").value)||5);
  b.label=document.getElementById("bm-label").value.trim()||b.label;
  b.sub=document.getElementById("bm-sub").value.trim()||b.sub;
  b.content=document.getElementById("bm-content").value.trim();
  b.coach=document.getElementById("bm-coach").value.trim();
  const sw=document.querySelector("#bm-colors .color-swatch.active");
  if(sw)b.color=sw.dataset.c;
  closeBlockModal();renderEditor();
}

function openNewProgModal(){
  newProgLv="deb";
  document.getElementById("np-name").value="";
  document.getElementById("np-phi").value="";
  document.getElementById("np-seance").value="4";
  updLv2Btns();
  document.getElementById("newprog-modal").classList.add("show");
}
function closeNewProgModal(){document.getElementById("newprog-modal").classList.remove("show");}
function pickLv2(lv){newProgLv=lv;updLv2Btns();}
function updLv2Btns(){document.querySelectorAll("[data-lv2]").forEach(b=>b.classList.toggle("sel",b.dataset.lv2===newProgLv));}
function createNewProg(){
  const name=document.getElementById("np-name").value.trim();
  if(!name){alert("Nom requis");return;}
  const sid=parseInt(document.getElementById("np-seance").value);
  const cfg=LV[newProgLv];
  const seanceNames={1:"Séance 1 — Cardio",2:"Séance 2 — Musculaire",3:"Séance 3 — Brûleur",4:"Séance personnalisée"};
  const np={id:"custom_"+Date.now(),seance:seanceNames[sid]||"Personnalisé",seanceId:sid,name,level:newProgLv,levelLabel:cfg.label,levelColor:cfg.color,color:"#ffffff",philosophy:document.getElementById("np-phi").value.trim(),stats:"",blocks:[{num:"01",label:"Bloc 1",sub:"Description",dur:10,color:"#ffffff",content:"Contenu du bloc",coach:"Note coach"}]};
  PROGRAMS.push(np);save();closeNewProgModal();openEditor(np.id);
}

document.addEventListener("keydown",e=>{
  if(!document.getElementById("s-timer").classList.contains("hidden")){
    if(e.code==="Space"){e.preventDefault();toggleTimer();}
    if(e.code==="ArrowRight"){e.preventDefault();jumpBlock(1);}
    if(e.code==="ArrowLeft"){e.preventDefault();jumpBlock(-1);}
  }
});

// ══ PASSWORD ════════════════════════════════════════════════════
const APP_PWD = "boxing22";
function checkPwd(){
  const val = document.getElementById("pwd-input").value;
  if(val === APP_PWD){
    document.getElementById("s-password").classList.add("hidden");
    document.getElementById("splash").classList.remove("hidden");
    localStorage.setItem("bl_auth","1");
  } else {
    document.getElementById("pwd-error").textContent="Mot de passe incorrect";
    document.getElementById("pwd-input").value="";
    setTimeout(()=>document.getElementById("pwd-error").textContent="",2000);
  }
}
